name: Node CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

   steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest

      - name: Configure Kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

        - name: Deploy to Kubernetes
        run: kubectl apply -f deployment.yaml

        - name: Check Rollout
        run: kubectl rollout status deployment/node-app

        - name: Rollback if Failed
      if: failure()
      run: kubectl rollout undo deployment/node-app
